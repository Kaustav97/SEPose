    precipitation: 0.0
    precipitation_deposits: 0.0
    sun_altitude_angle: 45.0
    sun_azimuth_angle: 90.0
    wind_intensity: 5.0
    fog_density: 0.0
    fog_distance: 0.0
    wetness: 0.0
  cloudy:
